<script>
fetch('./portfolio.json')
.then(response => response.json())
.then(data => {

    // SAFE extraction (no crashes)
    let baseline = data.reduce((sum, d) => sum + (d.irb_rwa_baseline || 0), 0);
    let adverse = data.reduce((sum, d) => sum + (d.irb_rwa_Adverse || 0), 0);
    let severe = data.reduce((sum, d) => sum + (d["irb_rwa_Severely Adverse"] || 0), 0);

    // RWA Chart
    let rwaChart = echarts.init(document.getElementById('rwaChart'));
    rwaChart.setOption({
        title: { text: 'RWA by Scenario' },
        tooltip: {},
        xAxis: { type: 'category', data: ['Baseline', 'Adverse', 'Severe'] },
        yAxis: { type: 'value' },
        series: [{
            data: [baseline, adverse, severe],
            type: 'bar'
        }]
    });

    // Sector breakdown
    let sectors = {};
    data.forEach(d => {
        let sector = d.sector || "Unknown";
        if (!sectors[sector]) sectors[sector] = 0;
        sectors[sector] += d.ead || 0;
    });

    let sectorData = Object.keys(sectors).map(k => ({
        name: k,
        value: sectors[k]
    }));

    let sectorChart = echarts.init(document.getElementById('sectorChart'));
    sectorChart.setOption({
        title: { text: 'EAD by Sector' },
        tooltip: { trigger: 'item' },
        series: [{
            type: 'pie',
            radius: '60%',
            data: sectorData
        }]
    });

})
.catch(error => {
    console.error("Error loading data:", error);
});
</script>
