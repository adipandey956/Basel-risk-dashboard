<!DOCTYPE html>
<html>
<head>
    <title>Basel Risk Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f7fa;
        }
        h1 {
            text-align: center;
        }
        .chart {
            width: 100%;
            height: 400px;
            margin: 30px 0;
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>

<h1>Basel Risk Dashboard</h1>

<div id="rwaChart" class="chart"></div>
<div id="sectorChart" class="chart"></div>

<script>
fetch('./portfolio.json')
.then(res => res.json())
.then(data => {

    const baseline = data.reduce((s,d)=>s+(d.irb_rwa_baseline||0),0);
    const adverse  = data.reduce((s,d)=>s+(d.irb_rwa_Adverse||0),0);
    const severe   = data.reduce((s,d)=>s+(d["irb_rwa_Severely Adverse"]||0),0);

    const rwaChart = echarts.init(document.getElementById('rwaChart'));
    rwaChart.setOption({
        title: { text: 'RWA by Scenario' },
        tooltip: {},
        xAxis: { type: 'category', data: ['Baseline','Adverse','Severe'] },
        yAxis: { type: 'value' },
        series: [{ type: 'bar', data: [baseline, adverse, severe] }]
    });

    const sectors = {};
    data.forEach(d=>{
        const s = d.sector || "Unknown";
        sectors[s] = (sectors[s]||0) + (d.ead||0);
    });

    const pieData = Object.keys(sectors).map(k=>({name:k,value:sectors[k]}));

    const sectorChart = echarts.init(document.getElementById('sectorChart'));
    sectorChart.setOption({
        title: { text: 'EAD by Sector' },
        tooltip: { trigger: 'item' },
        series: [{ type:'pie', radius:'60%', data: pieData }]
    });

})
.catch(err => console.error(err));
</script>

</body>
</html>
