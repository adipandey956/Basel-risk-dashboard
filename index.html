<!DOCTYPE html>
<html>
<head>
<title>Basel Risk Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

<style>
body { font-family: Arial; margin: 0; background:#0f172a; color:white; }
.container { padding:20px; }

h1 { text-align:center; margin-bottom:20px; }

.kpi-grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}

.kpi {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

.chart {
  height:400px;
  background:#1e293b;
  border-radius:10px;
  margin-bottom:20px;
}

select {
  padding:8px;
  margin-bottom:15px;
}
table {
  width:100%;
  border-collapse:collapse;
  background:#1e293b;
}
th, td {
  padding:8px;
  border-bottom:1px solid #334155;
}
</style>
</head>

<body>
<div class="container">

<h1>Basel Risk Command Center</h1>

<select id="scenario">
  <option value="baseline">Baseline</option>
  <option value="Adverse">Adverse</option>
  <option value="Severely Adverse">Severely Adverse</option>
</select>

<div class="kpi-grid">
  <div class="kpi"><h3>Total EAD</h3><p id="ead"></p></div>
  <div class="kpi"><h3>Total RWA</h3><p id="rwa"></p></div>
  <div class="kpi"><h3>Capital (8%)</h3><p id="cap"></p></div>
  <div class="kpi"><h3>Avg RW</h3><p id="avg"></p></div>
</div>

<div id="rwaChart" class="chart"></div>
<div id="sectorChart" class="chart"></div>

<table id="table">
<thead>
<tr>
<th>Name</th><th>Sector</th><th>EAD</th><th>RWA</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
fetch('./portfolio.json')
.then(res => res.json())
.then(data => {

function update(scenario){

let rwaKey = scenario==="baseline" ? "irb_rwa_baseline" :
             scenario==="Adverse" ? "irb_rwa_Adverse" :
             "irb_rwa_Severely Adverse";

let totalEAD = data.reduce((s,d)=>s+(d.ead||0),0);
let totalRWA = data.reduce((s,d)=>s+(d[rwaKey]||0),0);

document.getElementById("ead").innerText = totalEAD.toFixed(0);
document.getElementById("rwa").innerText = totalRWA.toFixed(0);
document.getElementById("cap").innerText = (totalRWA*0.08).toFixed(0);
document.getElementById("avg").innerText = (totalRWA/totalEAD).toFixed(2);

let sectors = {};
data.forEach(d=>{
  let s=d.sector||"Other";
  sectors[s]=(sectors[s]||0)+(d.ead||0);
});

let sectorData = Object.keys(sectors).map(k=>({name:k,value:sectors[k]}));

let chart1 = echarts.init(document.getElementById('rwaChart'));
chart1.setOption({
  title:{text:"RWA Distribution"},
  xAxis:{type:"category",data:data.map(d=>d.name)},
  yAxis:{},
  series:[{type:"bar",data:data.map(d=>d[rwaKey]||0)}]
});

let chart2 = echarts.init(document.getElementById('sectorChart'));
chart2.setOption({
  title:{text:"Sector EAD"},
  series:[{type:"pie",data:sectorData}]
});

let tbody = document.querySelector("#table tbody");
tbody.innerHTML="";
data.slice(0,30).forEach(d=>{
  let row = `<tr>
    <td>${d.name}</td>
    <td>${d.sector}</td>
    <td>${d.ead}</td>
    <td>${d[rwaKey]||0}</td>
  </tr>`;
  tbody.innerHTML += row;
});

}

update("baseline");

document.getElementById("scenario").addEventListener("change", e=>{
  update(e.target.value);
});

});
</script>

</body>
</html>
